on:
  push:
    branches:
      - main

jobs:
  deploy:
    environment:
      name: production
      url: https://larabox.voidgroup.net
    runs-on: ubuntu-latest
    steps:
      - name: Write deploy key to file
        run: echo "$DEPLOY_KEY" > larabox_deploy && chmod 0600 larabox_deploy
        env:
          DEPLOY_KEY: ${{secrets.DEPLOY_KEY}}
      - name: Write known host
        run: mkdir -p ~/.ssh && echo "$DEPLOY_HOSTKEY" >> ~/.ssh/known_hosts
        env:
          DEPLOY_HOSTKEY: ${{vars.DEPLOY_HOSTKEY}}
      - name: Deploy to target
        run: >
          ssh -i larabox_deploy "${{vars.DEPLOY_TARGET}}" "cd /srv/larabox.voidgroup.net &&
          php artisan down &&
          git fetch origin '${{github.sha}}' --depth 1 &&
          git reset --hard '${{github.sha}}' &&
          git clean -xf -e storage -e database -e .env &&
          composer install --no-interaction --prefer-dist --optimize-autoloader &&
          php artisan optimize &&
          php artisan migrate --force &&
          php artisan up"
concurrency: production
name: Deploy to production
run-name: Deploy to production (${{ github.event.head_commit.message }})
